<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundamentals of Computer Ethics | Midterm Exam 110 ข้อ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e2e0db;
    --text: #1a1a1a;
    --text-muted: #7a7a7a;
    --accent: #2c5f2e;
    --accent-light: #e8f0e8;
    --correct: #1a7a4a;
    --correct-bg: #edfaf3;
    --wrong: #c0392b;
    --wrong-bg: #fdf0ee;
    --tag-bg: #f0ede8;
    --progress-bg: #e2e0db;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.7;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  .header-left p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .progress-pill {
    background: var(--accent);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--progress-bg);
    height: 3px;
    position: sticky;
    top: 61px;
    z-index: 99;
  }
  .progress-bar-fill {
    background: var(--accent);
    height: 100%;
    transition: width 0.4s ease;
  }

  /* Main layout */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* Topic label */
  .topic-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--tag-bg);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    margin-bottom: 16px;
  }
  .topic-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .question-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .question-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 22px;
  }

  /* Options */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .option-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    min-width: 18px;
    margin-top: 2px;
  }

  .option-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
  }
  .option-btn.correct .option-label { color: var(--correct); }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
  }
  .option-btn.wrong .option-label { color: var(--wrong); }

  .option-btn:disabled { cursor: default; }

  /* Explanation box */
  .explanation {
    margin-top: 16px;
    padding: 16px;
    border-radius: 10px;
    border-left: 3px solid;
    font-size: 14px;
    line-height: 1.7;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation.correct-exp {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #155a38;
  }
  .explanation.wrong-exp {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: #8b1e18;
  }
  .explanation strong { font-weight: 600; }

  /* Navigation */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .nav-btn {
    padding: 11px 22px;
    border-radius: 10px;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: all 0.18s;
    letter-spacing: 0.01em;
  }
  .nav-btn.back {
    background: var(--surface);
    color: var(--text-muted);
  }
  .nav-btn.back:hover { border-color: var(--text-muted); color: var(--text); }

  .nav-btn.next {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    margin-left: auto;
  }
  .nav-btn.next:hover { background: #234e24; }
  .nav-btn.next:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
  }
  .result-screen.show { display: block; }

  .result-score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    margin-bottom: 24px;
  }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--accent-light);
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .score-number {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1;
  }
  .score-total { font-size: 13px; color: var(--text-muted); }

  .result-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .result-subtitle { font-size: 15px; color: var(--text-muted); margin-bottom: 24px; }

  /* Topic analysis */
  .analysis-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
    text-align: left;
  }
  .analysis-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .topic-row {
    margin-bottom: 14px;
  }
  .topic-row-header {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 5px;
  }
  .topic-name { font-weight: 500; flex: 1; }
  .topic-score { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .topic-bar-bg { background: var(--progress-bg); border-radius: 4px; height: 6px; }
  .topic-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

  .weak-topics {
    margin-top: 18px;
    padding: 14px;
    background: #fff8f0;
    border: 1px solid #f0d5b5;
    border-radius: 10px;
    font-size: 13px;
  }
  .weak-topics strong { color: #a05a00; }

  .restart-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s;
  }
  .restart-btn:hover { background: #234e24; }

  /* Responsive */
  @media (max-width: 540px) {
    .question-text { font-size: 15px; }
    .option-btn { font-size: 14px; }
    .header-left h1 { font-size: 13px; }
    .question-card { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Fundamentals of Computer Ethics</h1>
    <p>Midterm Exam · 110 ข้อ</p>
  </div>
  <div class="progress-pill" id="progressPill">0 / 110</div>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<div class="container">
  <div id="quizArea"></div>
  <div class="result-screen" id="resultScreen"></div>
</div>

<script>
const TOPICS = [
  "จริยธรรมด้านข้อมูลและคอมพิวเตอร์เบื้องต้น",
  "ความตระหนักรู้ความปลอดภัยด้านข้อมูลและระบบ",
  "จริยธรรมทางธุรกิจ (Business Ethics)",
  "จริยธรรมด้านการตรวจสอบทางการเงิน (Financial Ethics and Audit)",
  "จริยธรรมด้านการใช้งานเครือข่ายสังคมออนไลน์",
  "ความรู้กฎหมายด้านคอมพิวเตอร์เบื้องต้น",
  "จริยธรรมด้านพาณิชย์อิเล็กทรอนิกส์ (E-commerce Ethics)",
  "การคุ้มครองข้อมูลส่วนบุคคล (PDPA)",
  "ทรัพย์สินทางปัญญาและกฎหมายที่เกี่ยวข้องเบื้องต้น",
  "จรรยาบรรณวิชาชีพ (Code of Ethics)",
  "การคัดลอกผลงาน (Plagiarism)"
];

const QUESTIONS = [
  // ===== หัวข้อ 1: จริยธรรมด้านข้อมูลและคอมพิวเตอร์เบื้องต้น (10 ข้อ) =====
  {
    topic: 0,
    q: "จริยธรรม (Ethics) หมายถึงอะไร?",
    options: [
      "กฎหมายที่รัฐบาลบัญญัติขึ้นเพื่อควบคุมพฤติกรรมของประชาชน",
      "หลักการที่เป็นแนวทางการดำเนินชีวิตที่ถูกต้อง เพื่อประโยชน์ของตนเองและสังคม",
      "บรรทัดฐานทางสังคมที่ไม่มีการบันทึกเป็นลายลักษณ์อักษร",
      "ระบบความเชื่อทางศาสนาที่กำหนดสิ่งผิดและสิ่งถูก"
    ],
    answer: 1,
    exp: "จริยธรรม (Ethics) หมายถึง หลักการที่เป็นแนวทางการดำเนินชีวิตที่ถูกต้อง ควรประพฤติปฏิบัติ เพื่อประโยชน์ของตนเองและสังคม โดยครอบคลุมความประพฤติทางกาย วาจา และความคิด"
  },
  {
    topic: 0,
    q: "Morris Worm ถูกสร้างโดยใคร และเป็นสิ่งใด?",
    options: [
      "นักวิจัยอาวุโสของ FBI เพื่อทดสอบความปลอดภัยของเครือข่าย",
      "นักศึกษาระดับบัณฑิตศึกษา และเป็นหนึ่งในเวิร์มคอมพิวเตอร์ตัวแรกที่เผยแพร่ผ่านอินเทอร์เน็ต",
      "ทีมแฮกเกอร์จากรัสเซียเพื่อโจมตีสหรัฐอเมริกา",
      "บริษัทซอฟต์แวร์แห่งหนึ่งเพื่อทดสอบระบบรักษาความปลอดภัย"
    ],
    answer: 1,
    exp: "Morris Worm หรือ Internet Worm เป็นหนึ่งในเวิร์มคอมพิวเตอร์ตัวแรกที่เผยแพร่ผ่านอินเทอร์เน็ต สร้างขึ้นโดย Robert Morris นักศึกษาระดับบัณฑิตศึกษา ถือเป็นกรณีตัวอย่างสำคัญด้านจริยธรรมทางคอมพิวเตอร์"
  },
  {
    topic: 0,
    q: "ลัทธิสัมพัทธ์นิยม (Relativism) ในการตัดสินใจทางจริยธรรมหมายถึงอะไร?",
    options: [
      "การตัดสินโดยใช้กฎหมายเป็นมาตรฐานตายตัว",
      "การตัดสินโดยไม่มีเกณฑ์ตายตัว ขึ้นอยู่กับบริบทและสถานการณ์",
      "การตัดสินโดยยึดหลักศาสนาเป็นหลัก",
      "การตัดสินโดยคำนึงถึงประโยชน์สูงสุดของสังคม"
    ],
    answer: 1,
    exp: "ลัทธิสัมพัทธ์นิยม (Relativism) คือแบบการตัดสินจริยธรรมที่ไม่มีเกณฑ์ตายตัว แตกต่างจากลัทธิที่มีเกณฑ์ตายตัว เช่น ประโยชน์นิยม (Utilitarianism) หรือมโนธรรมสัมบูรณ์ (Ultimate Consciencism)"
  },
  {
    topic: 0,
    q: "Facebook–Cambridge Analytica data scandal เกี่ยวข้องกับข้อมูลของผู้ใช้กี่ล้านคน?",
    options: ["50 ล้านคน", "87 ล้านคน", "120 ล้านคน", "200 ล้านคน"],
    answer: 1,
    exp: "กรณี Facebook–Cambridge Analytica data scandal มีรายงานว่ามีการรวบรวมข้อมูลส่วนบุคคลของผู้ใช้ Facebook ถึง 87 ล้านคน ถือเป็นกรณีตัวอย่างสำคัญของการละเมิดจริยธรรมด้านข้อมูล"
  },
  {
    topic: 0,
    q: "จริยศาสตร์ (Ethics as a discipline) เป็นสาขาหนึ่งของอะไร?",
    options: ["จิตวิทยา", "สังคมวิทยา", "ปรัชญา", "นิติศาสตร์"],
    answer: 2,
    exp: "จริยศาสตร์เป็นแขนงหนึ่งของปรัชญา ที่ว่าด้วยเรื่องความประพฤติ ศึกษาถึงปัญหาคุณค่า ความประพฤติดี กฎเกณฑ์แห่งความประพฤติ หลักแห่งความดี ความถูกต้อง และความยุติธรรม"
  },
  {
    topic: 0,
    q: "การที่คุณให้สำเนาซอฟต์แวร์ Microsoft Word ของคุณแก่เพื่อน ถือเป็นการกระทำใด?",
    options: [
      "เป็นการแชร์ที่ถูกกฎหมาย ถ้าเพื่อนไม่ได้นำไปใช้เชิงพาณิชย์",
      "ไม่ผิดกฎหมาย ถ้าซอฟต์แวร์นั้นมีอายุเกิน 5 ปี",
      "การละเมิดลิขสิทธิ์ซอฟต์แวร์ (Software Piracy)",
      "ถือเป็น Fair Use ที่ยอมรับได้ตามกฎหมาย"
    ],
    answer: 2,
    exp: "การให้สำเนาซอฟต์แวร์ที่มีลิขสิทธิ์แก่ผู้อื่นโดยไม่ได้รับอนุญาตจากเจ้าของลิขสิทธิ์ ถือเป็นการละเมิดลิขสิทธิ์ซอฟต์แวร์ (Software Piracy) ซึ่งเป็นตัวอย่างของพฤติกรรมที่ไม่มีจริยธรรมทางคอมพิวเตอร์"
  },
  {
    topic: 0,
    q: "แหล่งที่มาของจริยธรรมข้อใด ไม่ถูกกล่าวถึงในเนื้อหาวิชา?",
    options: ["ปรัชญา", "ศาสนา", "วิทยาศาสตร์", "กฎหมายและนโยบายรัฐบาล"],
    answer: 2,
    exp: "แหล่งที่มาของจริยธรรมได้แก่ ปรัชญา ศาสนา นโยบายรัฐบาล/กฎหมาย และอิทธิพลทางสังคม (เช่น วัฒนธรรม มารยาท วิถีชีวิตท้องถิ่น วรรณคดี วิชาชีพ ขนบธรรมเนียม จารีต ค่านิยม) วิทยาศาสตร์ไม่ได้ถูกระบุเป็นแหล่งที่มาของจริยธรรม"
  },
  {
    topic: 0,
    q: "7 ขั้นตอนช่วยตัดสินใจทางจริยธรรม ขั้นตอนแรกคืออะไร?",
    options: [
      "ระบุผู้มีส่วนได้ส่วนเสียและวิเคราะห์เป้าหมาย",
      "รวบรวมข้อเท็จจริง แยกแยะเหตุปัจจัยหลักๆ ที่เกี่ยวข้อง",
      "เลือกแนวทางปฏิบัติที่ดีที่สุด",
      "วิเคราะห์ผลกระทบของการตัดสินใจ"
    ],
    answer: 1,
    exp: "ขั้นตอนแรกของ 7 ขั้นตอนช่วยตัดสินใจทางจริยธรรม คือการรวบรวมข้อเท็จจริง แยกแยะเหตุปัจจัยหลักๆ ที่เกี่ยวข้อง ก่อนที่จะระบุผู้มีส่วนได้ส่วนเสียและวิเคราะห์เป้าหมายในขั้นตอนถัดไป"
  },
  {
    topic: 0,
    q: "ประโยชน์นิยม (Utilitarianism) ใช้หลักการใดในการตัดสินจริยธรรม?",
    options: [
      "ยึดถือกฎศาสนาเป็นสำคัญ",
      "ยึดถือตามความรู้สึกส่วนตัว",
      "คำนึงถึงประโยชน์สูงสุดของส่วนรวม",
      "ใช้กฎหมายเป็นมาตรฐาน"

// State
let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let answered = new Array(QUESTIONS.length).fill(false);

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const isAnswered = answered[idx];
  const selected = answers[idx];

  const html = `
    <div class="topic-badge">
      <span class="dot"></span>
      หัวข้อ ${q.topic + 1} · ${TOPICS[q.topic]}
    </div>
    <div class="question-card">
      <div class="question-num">ข้อที่ ${idx + 1} / ${QUESTIONS.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options-list">
        ${q.options.map((opt, i) => {
          let cls = '';
          if (isAnswered) {
            if (i === q.answer) cls = 'correct';
            else if (i === selected && i !== q.answer) cls = 'wrong';
          } else if (i === selected) cls = 'selected';
          const labels = ['A', 'B', 'C', 'D'];
          return `<button class="option-btn ${cls}" onclick="selectOption(${idx}, ${i})" ${isAnswered ? 'disabled' : ''}>
            <span class="option-label">${labels[i]}</span>
            <span>${opt}</span>
          </button>`;
        }).join('')}
      </div>
      ${isAnswered ? `
        <div class="explanation ${selected === q.answer ? 'correct-exp' : 'wrong-exp'} show">
          ${selected === q.answer
            ? `<strong>✓ ถูกต้อง!</strong> ${q.exp}`
            : `<strong>✗ ไม่ถูกต้อง</strong> คำตอบที่ถูกคือ <strong>${['A','B','C','D'][q.answer]}. ${q.options[q.answer]}</strong><br>${q.exp}`
          }
        </div>` : ''}
    </div>
    <div class="nav-row">
      <button class="nav-btn back" onclick="goBack()" ${idx === 0 ? 'style="visibility:hidden"' : ''}>← ย้อนกลับ</button>
      ${isAnswered
        ? `<button class="nav-btn next" onclick="goNext()">
            ${idx === QUESTIONS.length - 1 ? 'ดูผลลัพธ์ →' : 'ข้อถัดไป →'}
          </button>`
        : `<button class="nav-btn next" disabled>กรุณาเลือกคำตอบ</button>`
      }
    </div>
  `;

  document.getElementById('quizArea').innerHTML = html;
  updateProgress();
  window.scrollTo(0, 0);
}

function selectOption(qIdx, optIdx) {
  if (answered[qIdx]) return;
  answers[qIdx] = optIdx;
  answered[qIdx] = true;
  renderQuestion(qIdx);
}

function goNext() {
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion(currentQ);
  } else {
    showResults();
  }
}

function goBack() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion(currentQ);
  }
}

function updateProgress() {
  const done = answered.filter(Boolean).length;
  const pct = (done / QUESTIONS.length) * 100;
  document.getElementById('progressPill').textContent = `${done} / ${QUESTIONS.length}`;
  document.getElementById('progressBar').style.width = pct + '%';
}

function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  const correct = answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const pct = Math.round((correct / QUESTIONS.length) * 100);

  // Calculate per-topic scores
  const topicStats = TOPICS.map((name, ti) => {
    const qs = QUESTIONS.filter(q => q.topic === ti);
    const correctInTopic = qs.filter((q, qi) => {
      const globalIdx = QUESTIONS.indexOf(q);
      return answers[globalIdx] === q.answer;
    }).length;
    return { name, correct: correctInTopic, total: qs.length };
  });

  const weakTopics = topicStats.filter(t => (t.correct / t.total) < 0.6);

  const getColor = (c, t) => {
    const r = c / t;
    if (r >= 0.8) return '#1a7a4a';
    if (r >= 0.6) return '#e6a817';
    return '#c0392b';
  };

  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : '📚';
  const msg = pct >= 80 ? 'ยอดเยี่ยมมาก!' : pct >= 60 ? 'ผ่านเกณฑ์แล้ว!' : 'ยังต้องพัฒนาต่อ';

  rs.innerHTML = `
    <div class="result-score-card">
      <div class="score-circle">
        <div class="score-number">${correct}</div>
        <div class="score-total">จาก ${QUESTIONS.length}</div>
      </div>
      <div class="result-title">${emoji} ${msg}</div>
      <div class="result-subtitle">คุณได้คะแนน ${pct}% (${correct}/${QUESTIONS.length} ข้อ)</div>
    </div>

    <div class="analysis-section">
      <div class="analysis-title">วิเคราะห์ผลตามหัวข้อ</div>
      ${topicStats.map(t => `
        <div class="topic-row">
          <div class="topic-row-header">
            <span class="topic-name">${t.name}</span>
            <span class="topic-score">${t.correct}/${t.total}</span>
          </div>
          <div class="topic-bar-bg">
            <div class="topic-bar-fill" style="width:${(t.correct/t.total)*100}%;background:${getColor(t.correct,t.total)}"></div>
          </div>
        </div>
      `).join('')}

      ${weakTopics.length > 0 ? `
        <div class="weak-topics">
          <strong>⚠️ หัวข้อที่ควรทบทวนเป็นพิเศษ:</strong><br>
          ${weakTopics.map(t => `• ${t.name} (${t.correct}/${t.total} ข้อ)`).join('<br>')}
        </div>
      ` : `
        <div class="weak-topics" style="background:#edfaf3;border-color:#a3d9be">
          <strong style="color:#155a38">✅ ทำได้ดีในทุกหัวข้อ!</strong> คะแนนผ่านเกณฑ์ 60% ทุกหัวข้อ
        </div>
      `}
    </div>

    <button class="restart-btn" onclick="restart()">🔄 ทำแบบทดสอบใหม่อีกครั้ง</button>
  `;

  updateProgress();
  window.scrollTo(0, 0);
}

function restart() {
  currentQ = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  answered = new Array(QUESTIONS.length).fill(false);
  document.getElementById('quizArea').style.display = '';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('resultScreen').innerHTML = '';
  renderQuestion(0);
}

// Init
renderQuestion(0);
</script>
